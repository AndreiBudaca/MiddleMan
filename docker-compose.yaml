services:
  middleman:
    image: andyyy2k/middleman:1.0
    env_file:
      - middleman.env
    environment:
      - ConnectionStrings__Redis=redis:6379
      - ASPNETCORE_HTTP_PORTS=80
    depends_on:
      - redis
    networks:
      - middleman-net
    ports:
      - "80:80"

  postgress_db:
    image: postgres
    restart: always
    shm_size: 128mb
    env_file:
      - postgress.env
    volumes:
      - ./db_init:/docker-entrypoint-initdb.d
    networks:
      - middleman-net

  redis:
    image: redis:7.2
    networks:
      - middleman-net

networks:
  middleman-net:
    driver: bridge